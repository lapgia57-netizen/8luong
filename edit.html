<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Quản lý thu chi - Quản trị viên</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #eef2f5;
      margin: 0;
      padding: 20px;
      color: #1e2a3a;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 28px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      overflow: hidden;
      transition: all 0.2s;
    }
    .app-header {
      background: #1e3a2f;
      color: white;
      padding: 20px 24px;
    }
    .app-header h1 {
      margin: 0 0 6px 0;
      font-size: 1.8rem;
    }
    .url-info {
      font-size: 0.7rem;
      opacity: 0.75;
      word-break: break-all;
      margin-top: 6px;
    }
    .logout-area {
      text-align: right;
      margin-top: 6px;
    }
    .logout-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .logout-btn:hover { background: #c72a2a; }
    .main-content {
      padding: 20px 24px 28px;
    }
    .login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .login-card {
      background: white;
      border-radius: 32px;
      padding: 32px 28px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 30px 40px rgba(0,0,0,0.2);
    }
    .login-card h2 {
      margin-top: 0;
      color: #1e3a2f;
    }
    .login-card input {
      width: 100%;
      padding: 14px 16px;
      margin: 12px 0;
      border: 1px solid #ccc;
      border-radius: 60px;
      font-size: 1rem;
    }
    .login-card button {
      background: #2e7d32;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
    }
    .error-msg {
      color: #d32f2f;
      margin-top: 8px;
      font-size: 0.85rem;
    }
    .balance-box {
      background: linear-gradient(125deg, #2b5e3b, #1e4620);
      border-radius: 28px;
      padding: 20px;
      text-align: center;
      color: white;
      margin-bottom: 28px;
    }
    .balance-box strong {
      font-size: 2rem;
      display: block;
      margin: 8px 0 4px;
    }
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 2px solid #e2e8f0;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      font-weight: 600;
      cursor: pointer;
      border-radius: 40px 40px 0 0;
      transition: 0.2s;
      background: #f1f5f9;
      color: #334155;
    }
    .tab.active {
      background: #2e7d32;
      color: white;
    }
    .form-card {
      background: #f9fbfd;
      padding: 16px 18px;
      border-radius: 24px;
      margin-bottom: 32px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }
    .form-group {
      margin-bottom: 14px;
    }
    label {
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 20px;
      font-size: 0.95rem;
      background: white;
    }
    button[type="submit"] {
      background: #2e7d32;
      width: 100%;
      border: none;
      padding: 12px;
      border-radius: 60px;
      font-weight: bold;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }
    button[type="submit"]:hover { background: #1b5e20; }
    .section-title {
      font-size: 1.3rem;
      margin: 20px 0 12px 0;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .record-list {
      max-height: 500px;
      overflow-y: auto;
    }
    .item {
      background: white;
      border-radius: 20px;
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      border-left: 6px solid;
      position: relative;
      transition: 0.1s;
    }
    .item.thu { border-left-color: #2e7d32; background: #f9fff7; }
    .item.chi { border-left-color: #d32f2f; background: #fff8f8; }
    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
    }
    .amount {
      font-size: 1.25rem;
      font-weight: 700;
    }
    .desc {
      font-weight: 500;
      margin: 6px 0 4px;
    }
    .meta {
      font-size: 0.7rem;
      color: #5b6e8c;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
    }
    .actions {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
    }
    .edit-btn, .delete-btn {
      border: none;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: bold;
      cursor: pointer;
    }
    .edit-btn { background: #3b82f6; color: white; }
    .delete-btn { background: #ef4444; color: white; }
    /* Popup modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 1100;
      backdrop-filter: blur(4px);
    }
    .modal-content {
      background: white;
      width: 90%;
      max-width: 500px;
      border-radius: 36px;
      padding: 24px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.2);
    }
    .modal-content h3 {
      margin-top: 0;
      color: #1e3a2f;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .modal-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 60px;
      border: none;
      font-weight: bold;
    }
    .cancel-modal {
      background: #cbd5e1;
    }
    .save-modal {
      background: #2e7d32;
      color: white;
    }
    .hidden { display: none; }
    .loading-text { text-align: center; color: #5b6e8c; padding: 20px; }
    footer { font-size: 0.7rem; text-align: center; margin-top: 20px; color: #5c6f87; }
  </style>
</head>
<body>

<div class="container" id="appContainer">
  <div class="app-header">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h1>📊 Quản lý thu chi</h1>
      <button class="logout-btn" id="logoutBtn" style="display:none;">🚪 Đăng xuất</button>
    </div>
    <div class="url-info">🔗 Firebase: khoanchitrongngay-default-rtdb.asia-southeast1</div>
  </div>
  <div class="main-content" id="mainContent" style="display: none;">
    <!-- Dashboard -->
    <div class="balance-box">
      💰 Số dư hiện tại
      <strong id="currentBalance">0 ₫</strong>
      <small>Tổng thu – Tổng chi</small>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="thu">➕ THU</div>
      <div class="tab" data-tab="chi">➖ CHI</div>
    </div>

    <!-- Form thu -->
    <form id="incomeForm" class="form-card">
      <div class="form-group"><label>Ngày</label><input type="date" id="ngay_thu" required></div>
      <div class="form-group"><label>Mô tả</label><input type="text" id="mo_ta_thu" placeholder="Tiền lương, thưởng..." required></div>
      <div class="form-group"><label>Số tiền (VNĐ)</label><input type="text" id="so_tien_thu" class="money-input" placeholder="0" required></div>
      <div class="form-group"><label>Danh mục</label><select id="danh_muc_thu"><option value="Lương">Lương / Thưởng</option><option value="Trợ cấp">Trợ cấp</option><option value="Kinh doanh">Kinh doanh</option><option value="Đầu tư">Đầu tư</option><option value="Khác">Khác</option></select></div>
      <div class="form-group"><label>Ghi chú</label><textarea id="ghi_chu_thu" rows="2"></textarea></div>
      <button type="submit">✅ Lưu khoản THU</button>
    </form>

    <!-- Form chi -->
    <form id="expenseForm" class="form-card hidden">
      <div class="form-group"><label>Ngày</label><input type="date" id="ngay_chi" required></div>
      <div class="form-group"><label>Mô tả</label><input type="text" id="mo_ta_chi" placeholder="Mua sắm, ăn uống..." required></div>
      <div class="form-group"><label>Số tiền (VNĐ)</label><input type="text" id="so_tien_chi" class="money-input" placeholder="0" required></div>
      <div class="form-group"><label>Danh mục</label><select id="danh_muc_chi"><option value="Ăn uống">Ăn uống</option><option value="Đi lại">Đi lại</option><option value="Mua sắm">Mua sắm</option><option value="Giải trí">Giải trí</option><option value="Khác">Khác</option></select></div>
      <div class="form-group"><label>Ghi chú</label><textarea id="ghi_chu_chi" rows="2"></textarea></div>
      <button type="submit">💸 Lưu khoản CHI</button>
    </form>

    <div class="section-title">📋 Tất cả giao dịch (mới nhất)</div>
    <div id="recordsContainer">
      <div id="loadingRecords">Đang tải dữ liệu...</div>
      <div id="recordsList"></div>
    </div>
    <footer>Quản trị viên có thể sửa/xóa mọi giao dịch</footer>
  </div>
</div>

<!-- Login Modal -->
<div id="loginModal" class="login-overlay">
  <div class="login-card">
    <h2>🔐 Đăng nhập quản trị</h2>
    <input type="text" id="loginUsername" placeholder="Tên đăng nhập" autocomplete="off">
    <input type="password" id="loginPassword" placeholder="Mật khẩu">
    <button id="doLoginBtn">Đăng nhập</button>
    <div id="loginError" class="error-msg"></div>
  </div>
</div>

<!-- Modal Popup chỉnh sửa chi tiết -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3>✏️ Chỉnh sửa giao dịch</h3>
    <input type="hidden" id="modal_id">
    <input type="hidden" id="modal_loai">
    <div class="form-group"><label>Ngày</label><input type="date" id="modal_ngay" required></div>
    <div class="form-group"><label>Giờ (HH:MM)</label><input type="time" id="modal_time" required></div>
    <div class="form-group"><label>Mô tả</label><input type="text" id="modal_mo_ta" required></div>
    <div class="form-group"><label>Số tiền (VNĐ)</label><input type="text" id="modal_so_tien" class="money-input" required></div>
    <div class="form-group"><label>Danh mục</label><select id="modal_danh_muc"></select></div>
    <div class="form-group"><label>Ghi chú</label><textarea id="modal_ghi_chu" rows="2"></textarea></div>
    <div class="modal-actions">
      <button class="cancel-modal" id="closeModalBtn">Hủy</button>
      <button class="save-modal" id="saveEditBtn">Lưu thay đổi</button>
    </div>
  </div>
</div>

<script>
  // ---------- FIREBASE ----------
  const firebaseConfig = { databaseURL: "https://khoanchitrongngay-default-rtdb.asia-southeast1.firebasedatabase.app" };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const thuRef = db.ref('thu-nhap');
  const chiRef = db.ref('chi-tieu');

  // ---------- ADMIN CREDENTIALS ----------
  const ADMIN_USER = "admin";
  const ADMIN_PASS = "admin";
  let isLoggedIn = false;

  // DOM elements
  const loginModalDiv = document.getElementById('loginModal');
  const mainContent = document.getElementById('mainContent');
  const logoutBtn = document.getElementById('logoutBtn');
  const currentBalanceSpan = document.getElementById('currentBalance');
  const recordsListDiv = document.getElementById('recordsList');
  const loadingDiv = document.getElementById('loadingRecords');

  // Forms
  const incomeForm = document.getElementById('incomeForm');
  const expenseForm = document.getElementById('expenseForm');
  // Tab logic
  const tabs = document.querySelectorAll('.tab');
  const thuForm = document.getElementById('incomeForm');
  const chiForm = document.getElementById('expenseForm');

  // Modal elements
  const editModal = document.getElementById('editModal');
  const modalId = document.getElementById('modal_id');
  const modalLoai = document.getElementById('modal_loai');
  const modalNgay = document.getElementById('modal_ngay');
  const modalTime = document.getElementById('modal_time');
  const modalMoTa = document.getElementById('modal_mo_ta');
  const modalSoTien = document.getElementById('modal_so_tien');
  const modalDanhMuc = document.getElementById('modal_danh_muc');
  const modalGhiChu = document.getElementById('modal_ghi_chu');
  const closeModalBtn = document.getElementById('closeModalBtn');
  const saveEditBtn = document.getElementById('saveEditBtn');

  // Set default ngay
  const todayStr = new Date().toISOString().slice(0,10);
  document.getElementById('ngay_thu').value = todayStr;
  document.getElementById('ngay_chi').value = todayStr;

  // Helper: format tiền
  function formatMoneyInput(inputEl) {
    inputEl.addEventListener('input', e => {
      let val = e.target.value.replace(/\D/g, '');
      if (val) val = Number(val).toLocaleString('vi-VN');
      e.target.value = val;
    });
    inputEl.addEventListener('focus', e => { e.target.value = e.target.value.replace(/\./g, ''); });
    inputEl.addEventListener('blur', e => {
      let val = e.target.value.replace(/\D/g, '');
      if (val) e.target.value = Number(val).toLocaleString('vi-VN');
    });
  }
  document.querySelectorAll('.money-input').forEach(inp => formatMoneyInput(inp));

  // Date + time helpers
  function getTimestampFromDateAndTime(dateVal, timeVal) {
    if (!dateVal) return Date.now();
    const [hh, mm] = timeVal.split(':');
    const dateObj = new Date(`${dateVal}T${hh || '12'}:${mm || '00'}:00`);
    return dateObj.getTime();
  }
  function formatDateTimeFromTimestamp(ts) {
    if (!ts) return { datePart: new Date().toISOString().slice(0,10), timePart: "12:00" };
    const d = new Date(ts);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const hh = String(d.getHours()).padStart(2,'0');
    const min = String(d.getMinutes()).padStart(2,'0');
    return { datePart: `${yyyy}-${mm}-${dd}`, timePart: `${hh}:${min}` };
  }

  // load data + render
  let allRecordsCache = [];
  async function fetchAndRender() {
    if (!isLoggedIn) return;
    loadingDiv.style.display = 'block';
    recordsListDiv.innerHTML = '';
    try {
      const [thuSnap, chiSnap] = await Promise.all([thuRef.once('value'), chiRef.once('value')]);
      let totalThu = 0, totalChi = 0;
      const records = [];
      const thuData = thuSnap.val() || {};
      for (const [id, item] of Object.entries(thuData)) {
        const soTien = Number(item.so_tien) || 0;
        totalThu += soTien;
        records.push({ id, ref: thuRef.child(id), loai: 'thu', ...item, so_tien: soTien });
      }
      const chiData = chiSnap.val() || {};
      for (const [id, item] of Object.entries(chiData)) {
        const soTien = Number(item.so_tien) || 0;
        totalChi += soTien;
        records.push({ id, ref: chiRef.child(id), loai: 'chi', ...item, so_tien: soTien });
      }
      const balance = totalThu - totalChi;
      currentBalanceSpan.innerHTML = balance.toLocaleString('vi-VN') + ' ₫';
      currentBalanceSpan.style.color = balance >= 0 ? '#c8e6b5' : '#ffcdd2';
      records.sort((a,b) => (b.thoi_gian || 0) - (a.thoi_gian || 0));
      allRecordsCache = records;
      renderRecordList(records.slice(0, 80));
      loadingDiv.style.display = 'none';
    } catch (err) {
      loadingDiv.innerHTML = 'Lỗi tải dữ liệu: ' + err.message;
      console.error(err);
    }
  }

  function renderRecordList(records) {
    if (!recordsListDiv) return;
    if (records.length === 0) {
      recordsListDiv.innerHTML = '<div style="text-align:center; padding:20px;">📭 Chưa có giao dịch nào</div>';
      return;
    }
    let html = '';
    for (let item of records) {
      const sign = item.loai === 'thu' ? '+' : '-';
      const amountColor = item.loai === 'thu' ? '#2b6e3b' : '#c62828';
      const timeStr = formatDateTimeFromTimestamp(item.thoi_gian);
      const hhmm = timeStr.timePart;
      const ngayHien = item.ngay || timeStr.datePart;
      const formattedMoney = Number(item.so_tien).toLocaleString('vi-VN');
      const danhMuc = item.danh_muc || (item.loai === 'thu' ? 'Khác' : 'Khác');
      const ghiChuShort = item.ghi_chu ? ` • ${item.ghi_chu.substring(0, 40)}` : '';
      html += `
        <div class="item ${item.loai}">
          <div class="actions">
            <button class="edit-btn" data-id="${item.id}" data-loai="${item.loai}" data-raw='${JSON.stringify(item).replace(/'/g, "&#39;")}'>Sửa</button>
            <button class="delete-btn" data-id="${item.id}" data-loai="${item.loai}">Xóa</button>
          </div>
          <div class="item-header">
            <span class="amount" style="color:${amountColor}">${sign} ${formattedMoney} ₫</span>
            <span class="meta">📅 ${ngayHien} ⏱️ ${hhmm}</span>
          </div>
          <div class="desc"><strong>${escapeHtml(item.mo_ta || 'Không tiêu đề')}</strong> <span style="font-size:0.8rem;">(${danhMuc})</span></div>
          <div class="meta">🆔 ${item.id.substring(0,6)}${ghiChuShort}</div>
        </div>
      `;
    }
    recordsListDiv.innerHTML = html;
    // gắn sự kiện cho edit/delete buttons (dynamic)
    document.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        const loai = btn.getAttribute('data-loai');
        const raw = btn.getAttribute('data-raw');
        try {
          const itemData = JSON.parse(raw);
          openEditModal(id, loai, itemData);
        } catch(e) { console.warn(e); }
      });
    });
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        const loai = btn.getAttribute('data-loai');
        if (confirm('⚠️ Bạn có chắc muốn xóa giao dịch này? Hành động không thể hoàn tác.')) {
          const ref = loai === 'thu' ? thuRef.child(id) : chiRef.child(id);
          try {
            await ref.remove();
            alert('Đã xóa thành công!');
            await fetchAndRender();
          } catch(err) { alert('Lỗi xóa: ' + err.message); }
        }
      });
    });
  }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // OPEN MODAL with full item details
  function openEditModal(id, loai, item) {
    modalId.value = id;
    modalLoai.value = loai;
    const { datePart, timePart } = formatDateTimeFromTimestamp(item.thoi_gian || Date.now());
    modalNgay.value = item.ngay || datePart;
    modalTime.value = timePart;
    modalMoTa.value = item.mo_ta || '';
    modalSoTien.value = Number(item.so_tien || 0).toLocaleString('vi-VN');
    modalGhiChu.value = item.ghi_chu || '';
    // populate danh mục dropdown
    let optionsHtml = '';
    if (loai === 'thu') {
      const thuOptions = ['Lương','Trợ cấp','Kinh doanh','Đầu tư','Khác'];
      thuOptions.forEach(opt => {
        optionsHtml += `<option value="${opt}" ${item.danh_muc === opt ? 'selected' : ''}>${opt}</option>`;
      });
    } else {
      const chiOptions = ['Ăn uống','Đi lại','Mua sắm','Giải trí','Khác'];
      chiOptions.forEach(opt => {
        optionsHtml += `<option value="${opt}" ${item.danh_muc === opt ? 'selected' : ''}>${opt}</option>`;
      });
    }
    modalDanhMuc.innerHTML = optionsHtml;
    editModal.style.display = 'flex';
  }

  function hideModal() { editModal.style.display = 'none'; }

  // Save edit from modal
  async function saveEditFromModal() {
    const id = modalId.value;
    const loai = modalLoai.value;
    if (!id) return;
    const ngay = modalNgay.value;
    const timeVal = modalTime.value;
    const moTa = modalMoTa.value.trim();
    let rawMoney = modalSoTien.value.replace(/\./g, '');
    const soTienNum = Number(rawMoney);
    if (isNaN(soTienNum) || soTienNum <= 0) {
      alert('Số tiền không hợp lệ');
      return;
    }
    const danhMuc = modalDanhMuc.value;
    const ghiChu = modalGhiChu.value.trim() || null;
    const newTimestamp = getTimestampFromDateAndTime(ngay, timeVal);
    const updateData = {
      ngay: ngay,
      mo_ta: moTa,
      so_tien: soTienNum,
      danh_muc: danhMuc,
      ghi_chu: ghiChu,
      thoi_gian: newTimestamp,
      loai: loai
    };
    const ref = loai === 'thu' ? thuRef.child(id) : chiRef.child(id);
    try {
      await ref.update(updateData);
      alert('✅ Cập nhật giao dịch thành công!');
      hideModal();
      await fetchAndRender();
    } catch (err) {
      alert('Lỗi cập nhật: ' + err.message);
    }
  }

  // Submit Thu / Chi
  async function addTransaction(type) {
    if (!isLoggedIn) return;
    const isThu = type === 'thu';
    const ngayEl = isThu ? document.getElementById('ngay_thu') : document.getElementById('ngay_chi');
    const moTaEl = isThu ? document.getElementById('mo_ta_thu') : document.getElementById('mo_ta_chi');
    const soTienEl = isThu ? document.getElementById('so_tien_thu') : document.getElementById('so_tien_chi');
    const danhMucEl = isThu ? document.getElementById('danh_muc_thu') : document.getElementById('danh_muc_chi');
    const ghiChuEl = isThu ? document.getElementById('ghi_chu_thu') : document.getElementById('ghi_chu_chi');
    const ngay = ngayEl.value;
    const moTa = moTaEl.value.trim();
    let rawMoney = soTienEl.value.replace(/\./g, '');
    const soTien = Number(rawMoney);
    if (!ngay || !moTa || isNaN(soTien) || soTien <= 0) {
      alert('Vui lòng điền đầy đủ thông tin và số tiền hợp lệ');
      return;
    }
    const now = Date.now();
    const data = {
      ngay: ngay,
      mo_ta: moTa,
      so_tien: soTien,
      danh_muc: danhMucEl.value,
      ghi_chu: ghiChuEl.value.trim() || null,
      thoi_gian: now,
      loai: type
    };
    const ref = isThu ? thuRef : chiRef;
    try {
      await ref.push(data);
      alert(`Đã thêm khoản ${type === 'thu' ? 'THU' : 'CHI'} thành công!`);
      // reset form
      if (isThu) document.getElementById('incomeForm').reset();
      else document.getElementById('expenseForm').reset();
      document.getElementById(isThu ? 'ngay_thu' : 'ngay_chi').value = todayStr;
      await fetchAndRender();
    } catch (err) { alert('Lỗi: '+err.message); }
  }

  incomeForm.addEventListener('submit', (e) => { e.preventDefault(); addTransaction('thu'); });
  expenseForm.addEventListener('submit', (e) => { e.preventDefault(); addTransaction('chi'); });

  // Tab switching
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const type = tab.dataset.tab;
      if (type === 'thu') {
        thuForm.classList.remove('hidden');
        chiForm.classList.add('hidden');
      } else {
        thuForm.classList.add('hidden');
        chiForm.classList.remove('hidden');
      }
      hideModal();
    });
  });

  // Login logic
  const doLoginBtn = document.getElementById('doLoginBtn');
  const loginUserInput = document.getElementById('loginUsername');
  const loginPassInput = document.getElementById('loginPassword');
  const loginErrorSpan = document.getElementById('loginError');
  function handleLogin() {
    const user = loginUserInput.value.trim();
    const pwd = loginPassInput.value;
    if (user === ADMIN_USER && pwd === ADMIN_PASS) {
      isLoggedIn = true;
      loginModalDiv.style.display = 'none';
      mainContent.style.display = 'block';
      logoutBtn.style.display = 'inline-block';
      fetchAndRender();
      // realtime listeners
      thuRef.on('value', () => { if(isLoggedIn) fetchAndRender(); });
      chiRef.on('value', () => { if(isLoggedIn) fetchAndRender(); });
    } else {
      loginErrorSpan.innerText = 'Sai tên đăng nhập hoặc mật khẩu!';
    }
  }
  doLoginBtn.addEventListener('click', handleLogin);
  loginUserInput.addEventListener('keypress', e => { if(e.key === 'Enter') handleLogin(); });
  loginPassInput.addEventListener('keypress', e => { if(e.key === 'Enter') handleLogin(); });
  logoutBtn.addEventListener('click', () => {
    isLoggedIn = false;
    loginModalDiv.style.display = 'flex';
    mainContent.style.display = 'none';
    logoutBtn.style.display = 'none';
    loginUserInput.value = '';
    loginPassInput.value = '';
    loginErrorSpan.innerText = '';
    // clear UI
    recordsListDiv.innerHTML = '';
    currentBalanceSpan.innerHTML = '0 ₫';
  });
  closeModalBtn.addEventListener('click', hideModal);
  saveEditBtn.addEventListener('click', saveEditFromModal);
  window.addEventListener('click', (e) => { if (e.target === editModal) hideModal(); });
  // initial: show login
  mainContent.style.display = 'none';
  logoutBtn.style.display = 'none';
</script>
</body>
</html>
