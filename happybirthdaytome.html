<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Giang 🎂</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: white;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    @keyframes gradient {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .container {
      text-align: center;
      padding: 30px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.18);
      max-width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    h1 {
      font-size: 3.8rem;
      margin: 0.3em 0;
      text-shadow: 0 0 20px rgba(255,255,255,0.6);
    }

    .subtitle {
      font-size: 1.5rem;
      margin: 0.4em 0 1.5em;
      opacity: 0.9;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .box {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 18px 28px;
      min-width: 110px;
      border: 1px solid rgba(255,255,255,0.25);
      transition: all 0.3s;
    }

    .box:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }

    .number {
      font-size: 3.6rem;
      font-weight: bold;
      line-height: 1;
      margin: 0;
      text-shadow: 0 4px 12px rgba(0,0,0,0.5);
    }

    .label {
      font-size: 1.1rem;
      margin-top: 8px;
      opacity: 0.85;
      letter-spacing: 1px;
    }

    .cake {
      font-size: 6rem;
      margin: 1rem 0;
      animation: float 3.5s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-18px); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.8rem; }
      .number { font-size: 2.8rem; }
      .box { min-width: 85px; padding: 15px 20px; }
      .cake { font-size: 5rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="cake">🎂✨</div>
    <h1>Happy Birthday Giang!</h1>
    <div class="subtitle">Đếm ngược đến 17 tháng 1 năm tiếp theo</div>

    <div class="countdown" id="countdown">
      <div class="box"><div class="number" id="days">00</div><div class="label">Ngày</div></div>
      <div class="box"><div class="number" id="hours">00</div><div class="label">Giờ</div></div>
      <div class="box"><div class="number" id="minutes">00</div><div class="label">Phút</div></div>
      <div class="box"><div class="number" id="seconds">00</div><div class="label">Giây</div></div>
    </div>
  </div>

  <script>
    function getNextBirthday() {
      const today = new Date();
      let year = today.getFullYear();
      
      const birthday = new Date(year, 0, 17); // Tháng 1 = 0
      
      // Nếu sinh nhật năm nay đã qua → tính năm sau
      if (today > birthday) {
        year++;
      }
      
      return new Date(year, 0, 17, 0, 0, 0);
    }

    function updateCountdown() {
      const now = new Date();
      const birth = getNextBirthday();
      const diff = birth - now;

      if (diff <= 0) {
        // Đúng ngày sinh nhật (hoặc vừa qua 0h)
        document.getElementById('days').textContent = "00";
        document.getElementById('hours').textContent = "00";
        document.getElementById('minutes').textContent = "00";
        document.getElementById('seconds').textContent = "00";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = String(days).padStart(2, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    // Chạy ngay lập tức và cập nhật mỗi giây
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
